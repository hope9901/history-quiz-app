<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 260" width="160" height="260">
  <defs>
    <linearGradient id="pagodaGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9ca3af" />
      <stop offset="50%" stop-color="#d1d5db" />
      <stop offset="100%" stop-color="#4b5563" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0" />
    </linearGradient>
  </defs>
  <!-- Glow Background -->
  <circle cx="80" cy="130" r="70" fill="url(#glowGrad)" filter="blur(10px)" />
  
  <!-- Foundation Pedestal -->
  <rect x="20" y="220" width="120" height="25" fill="#374151" stroke="#4b5563" stroke-width="2" />
  <rect x="30" y="200" width="100" height="20" fill="#4b5563" stroke="#6b7280" stroke-width="2" />

  <!-- 1st Floor (Body & Roof) -->
  <rect x="45" y="165" width="70" height="35" fill="url(#pagodaGrad)" stroke="#4b5563" stroke-width="2" />
  <!-- Roof 1 -->
  <path d="M 35,165 L 125,165 L 115,150 L 45,150 Z" fill="#374151" stroke="#4b5563" stroke-width="2" />

  <!-- 2nd Floor (Body & Roof) -->
  <rect x="52" y="125" width="56" height="25" fill="url(#pagodaGrad)" stroke="#4b5563" stroke-width="2" />
  <!-- Roof 2 -->
  <path d="M 42,125 L 118,125 L 110,112 L 50,112 Z" fill="#374151" stroke="#4b5563" stroke-width="2" />

  <!-- 3rd Floor (Body & Roof) -->
  <rect x="58" y="92" width="44" height="20" fill="url(#pagodaGrad)" stroke="#4b5563" stroke-width="2" />
  <!-- Roof 3 -->
  <path d="M 50,92 L 110,92 L 102,82 L 58,82 Z" fill="#374151" stroke="#4b5563" stroke-width="2" />

  <!-- Pagoda Finial (상륜부) -->
  <line x1="80" y1="82" x2="80" y2="40" stroke="#d1d5db" stroke-width="3" />
  <circle cx="80" cy="65" r="8" fill="#f59e0b" stroke="#d1d5db" stroke-width="2" />
  <circle cx="80" cy="50" r="5" fill="#f59e0b" stroke="#d1d5db" stroke-width="1.5" />
  <path d="M 75,40 Q 80,30 85,40 Z" fill="#f59e0b" stroke="#d1d5db" stroke-width="2" />
</svg>
