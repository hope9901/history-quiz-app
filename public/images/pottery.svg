<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 250" width="200" height="250">
  <defs>
    <linearGradient id="potteryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b45309" />
      <stop offset="100%" stop-color="#78350f" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0" />
    </linearGradient>
  </defs>
  <!-- Background Glow -->
  <ellipse cx="100" cy="130" rx="70" ry="90" fill="url(#glowGrad)" filter="blur(10px)" />
  
  <!-- Pottery Body -->
  <path d="M 50,40 
           C 40,80 30,150 100,230 
           C 170,150 160,80 150,40 
           Z" 
        fill="url(#potteryGrad)" 
        stroke="#f59e0b" 
        stroke-width="3" />
  
  <!-- Comb Patterns (빗살무늬 선들) -->
  <!-- Top horizontal lines -->
  <path d="M 55,55 Q 100,60 145,55" fill="none" stroke="#fbbf24" stroke-width="2" stroke-dasharray="4,4" />
  <path d="M 52,70 Q 100,75 148,70" fill="none" stroke="#fbbf24" stroke-width="2" stroke-dasharray="4,4" />
  
  <!-- Diagonal comb lines -->
  <path d="M 50,90 L 80,120 M 60,85 L 90,115 M 70,80 L 100,110 M 80,75 L 110,105 M 90,70 L 120,100" fill="none" stroke="#f59e0b" stroke-width="1.5" />
  <path d="M 150,90 L 120,120 M 140,85 L 110,115 M 130,80 L 100,110 M 120,75 L 90,105 M 110,70 L 80,100" fill="none" stroke="#f59e0b" stroke-width="1.5" />
  
  <!-- V-shapes on body -->
  <path d="M 70,140 L 100,170 L 130,140" fill="none" stroke="#fbbf24" stroke-width="2" />
  <path d="M 78,160 L 100,185 L 122,160" fill="none" stroke="#fbbf24" stroke-width="2" />
  <path d="M 85,180 L 100,200 L 115,180" fill="none" stroke="#fbbf24" stroke-width="2" />
  
  <!-- Pottery Rim -->
  <ellipse cx="100" cy="40" rx="50" ry="12" fill="#78350f" stroke="#fbbf24" stroke-width="3" />
</svg>
