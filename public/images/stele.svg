<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 250" width="150" height="250">
  <defs>
    <linearGradient id="steleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4b5563" />
      <stop offset="100%" stop-color="#1f2937" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0" />
    </linearGradient>
  </defs>
  <!-- Background Glow -->
  <rect x="15" y="15" width="120" height="220" rx="10" fill="url(#glowGrad)" filter="blur(8px)" />

  <!-- Base Pedestal (비석 받침돌) -->
  <path d="M 20,210 L 130,210 L 140,235 L 10,235 Z" fill="#111827" stroke="#9ca3af" stroke-width="2" />
  <rect x="25" y="200" width="100" height="10" fill="#374151" stroke="#9ca3af" stroke-width="2" />

  <!-- Stele Body (비석 본체) -->
  <path d="M 35,30 Q 75,25 115,30 L 120,200 L 30,200 Z" fill="url(#steleGrad)" stroke="#9ca3af" stroke-width="3" />

  <!-- Decorative Patterns/Cracks & Inscriptions (한자 비문 명문 가상 묘사) -->
  <path d="M 40,40 L 45,55 M 105,42 L 110,60" fill="none" stroke="#374151" stroke-width="1.5" />
  
  <!-- 가상 한자 텍스트 행 -->
  <!-- Column 1 -->
  <rect x="48" y="50" width="10" height="10" rx="1" fill="#9ca3af" opacity="0.8" />
  <rect x="48" y="70" width="10" height="10" rx="1" fill="#9ca3af" opacity="0.8" />
  <rect x="48" y="90" width="10" height="10" rx="1" fill="#9ca3af" opacity="0.8" />
  <rect x="48" y="110" width="10" height="10" rx="1" fill="#9ca3af" opacity="0.8" />
  <rect x="48" y="130" width="10" height="10" rx="1" fill="#9ca3af" opacity="0.8" />
  <rect x="48" y="150" width="10" height="10" rx="1" fill="#9ca3af" opacity="0.8" />
  <rect x="48" y="170" width="10" height="10" rx="1" fill="#9ca3af" opacity="0.8" />

  <!-- Column 2 -->
  <rect x="70" y="55" width="10" height="10" rx="1" fill="#e5e7eb" opacity="0.9" />
  <rect x="70" y="75" width="10" height="10" rx="1" fill="#e5e7eb" opacity="0.9" />
  <rect x="70" y="95" width="10" height="10" rx="1" fill="#e5e7eb" opacity="0.9" />
  <rect x="70" y="115" width="10" height="10" rx="1" fill="#e5e7eb" opacity="0.9" />
  <rect x="70" y="135" width="10" height="10" rx="1" fill="#e5e7eb" opacity="0.9" />
  <rect x="70" y="155" width="10" height="10" rx="1" fill="#e5e7eb" opacity="0.9" />
  <rect x="70" y="175" width="10" height="10" rx="1" fill="#e5e7eb" opacity="0.9" />

  <!-- Column 3 -->
  <rect x="92" y="50" width="10" height="10" rx="1" fill="#9ca3af" opacity="0.8" />
  <rect x="92" y="70" width="10" height="10" rx="1" fill="#9ca3af" opacity="0.8" />
  <rect x="92" y="90" width="10" height="10" rx="1" fill="#9ca3af" opacity="0.8" />
  <rect x="92" y="110" width="10" height="10" rx="1" fill="#9ca3af" opacity="0.8" />
  <rect x="92" y="130" width="10" height="10" rx="1" fill="#9ca3af" opacity="0.8" />
  <rect x="92" y="150" width="10" height="10" rx="1" fill="#9ca3af" opacity="0.8" />
  <rect x="92" y="170" width="10" height="10" rx="1" fill="#9ca3af" opacity="0.8" />
</svg>
