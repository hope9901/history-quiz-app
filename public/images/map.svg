<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 200" width="180" height="200">
  <defs>
    <linearGradient id="mapGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>
  <!-- Glow -->
  <rect x="10" y="10" width="160" height="180" rx="8" fill="#a78bfa" fill-opacity="0.08" filter="blur(8px)" />
  
  <!-- Map Outline Box -->
  <rect x="15" y="15" width="150" height="170" rx="6" fill="url(#mapGrad)" stroke="#4b5563" stroke-width="2" />
  
  <!-- Grid Lines (지도 느낌 극대화) -->
  <line x1="15" y1="70" x2="165" y2="70" stroke="#1e293b" stroke-width="1" stroke-dasharray="3,3" />
  <line x1="15" y1="125" x2="165" y2="125" stroke="#1e293b" stroke-width="1" stroke-dasharray="3,3" />
  <line x1="65" y1="15" x2="65" y2="185" stroke="#1e293b" stroke-width="1" stroke-dasharray="3,3" />
  <line x1="115" y1="15" x2="115" y2="185" stroke="#1e293b" stroke-width="1" stroke-dasharray="3,3" />

  <!-- Korea Peninsula Silhouette (추상 한반도 셰이프) -->
  <path d="M 65,30 
           C 85,25 95,35 90,55 
           C 85,75 105,85 100,105 
           C 95,125 110,145 95,165 
           C 80,180 75,170 70,160
           C 65,140 75,120 70,100
           C 65,80 50,60 55,45
           Z" 
        fill="#374151" 
        stroke="#4b5563" 
        stroke-width="1.5" />

  <!-- Territory Arrows (영토 확장 및 진출 가상 화살표) -->
  <!-- Arrow 1 (Gorguryeo Southern expansion) -->
  <path d="M 80,45 L 80,100" fill="none" stroke="url(#arrowGrad)" stroke-width="4" marker-end="url(#arrowTip)" />
  <path d="M 75,90 L 80,100 L 85,90" fill="none" stroke="url(#arrowGrad)" stroke-width="3" stroke-linecap="round" />
  
  <!-- Arrow 2 (Nangnang or East sea direction) -->
  <path d="M 85,65 Q 120,70 125,90" fill="none" stroke="#06b6d4" stroke-width="3" />
  <path d="M 118,85 L 125,90 L 122,80" fill="none" stroke="#06b6d4" stroke-width="2.5" />
  
  <!-- Capitals / Marks (성곽 또는 도읍지 심볼) -->
  <circle cx="80" cy="50" r="5" fill="#f59e0b" stroke="#fff" stroke-width="1.5" /> <!-- 평양성 느낌 -->
  <circle cx="95" cy="115" r="4" fill="#ef4444" stroke="#fff" stroke-width="1" /> <!-- 한성 느낌 -->
</svg>
