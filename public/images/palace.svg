<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <linearGradient id="roofGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="pillarGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#991b1b" />
      <stop offset="100%" stop-color="#7f1d1d" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0" />
    </linearGradient>
  </defs>
  <!-- Glow -->
  <circle cx="90" cy="90" r="75" fill="url(#glow)" filter="blur(8px)" />

  <!-- Platform (기단) -->
  <rect x="15" y="140" width="150" height="15" fill="#4b5563" stroke="#374151" stroke-width="2" />
  <rect x="25" y="130" width="130" height="10" fill="#6b7280" stroke="#4b5563" stroke-width="1.5" />

  <!-- Pillars (기둥들) -->
  <rect x="40" y="80" width="10" height="50" fill="url(#pillarGrad)" stroke="#450a0a" stroke-width="1.5" />
  <rect x="85" y="80" width="10" height="50" fill="url(#pillarGrad)" stroke="#450a0a" stroke-width="1.5" />
  <rect x="130" y="80" width="10" height="50" fill="url(#pillarGrad)" stroke="#450a0a" stroke-width="1.5" />

  <!-- Walls/Doors (창호문 느낌 격자무늬) -->
  <rect x="54" y="85" width="27" height="45" fill="#fef08a" fill-opacity="0.1" stroke="#d97706" stroke-width="1" />
  <rect x="99" y="85" width="27" height="45" fill="#fef08a" fill-opacity="0.1" stroke="#d97706" stroke-width="1" />
  <!-- Window lattices (창살) -->
  <line x1="67.5" y1="85" x2="67.5" y2="130" stroke="#d97706" stroke-width="0.5" />
  <line x1="112.5" y1="85" x2="112.5" y2="130" stroke="#d97706" stroke-width="0.5" />
  <line x1="54" y1="107.5" x2="81" y2="107.5" stroke="#d97706" stroke-width="0.5" />
  <line x1="99" y1="107.5" x2="126" y2="107.5" stroke="#d97706" stroke-width="0.5" />

  <!-- Roof structure (공포/보) -->
  <rect x="30" y="70" width="120" height="10" fill="#d97706" stroke="#92400e" stroke-width="1.5" />

  <!-- Tile Roof (기와지붕) -->
  <path d="M 15,70 
           C 25,60 45,45 90,45 
           C 135,45 155,60 165,70 
           C 145,67 125,60 90,60 
           C 55,60 35,67 15,70 
           Z" 
        fill="url(#roofGrad)" 
        stroke="#475569" 
        stroke-width="2" />
  
  <!-- Roof Ridge Ornament (용마루 및 잡상 장식) -->
  <path d="M 25,48 Q 90,32 155,48" fill="none" stroke="#475569" stroke-width="4" />
  <circle cx="25" cy="48" r="3" fill="#f59e0b" />
  <circle cx="155" cy="48" r="3" fill="#f59e0b" />
</svg>
